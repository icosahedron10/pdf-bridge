name: pdf-bridge

services:
  clamav:
    # The Dockerfile pins the exact official patch and aligns INSTREAM with the app limit.
    build:
      context: .
      dockerfile: clamav.Dockerfile
    image: pdf-bridge-clamav:1.5.3-stream64m
    restart: unless-stopped
    volumes:
      - clamav_signatures:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping=5"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 3m
    mem_limit: 4g

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      clamav:
        condition: service_healthy
    environment:
      PDF_BRIDGE_APP_ENV: "${PDF_BRIDGE_APP_ENV:-development}"
      PDF_BRIDGE_AUTH_MODE: "${PDF_BRIDGE_AUTH_MODE:-anonymous-poc}"
      PDF_BRIDGE_STORAGE_ROOT: /var/lib/pdf-bridge
      PDF_BRIDGE_SESSION_SECRET: "${PDF_BRIDGE_SESSION_SECRET:?set PDF_BRIDGE_SESSION_SECRET in .env}"
      PDF_BRIDGE_JOB_TOKEN: "${PDF_BRIDGE_JOB_TOKEN:?set PDF_BRIDGE_JOB_TOKEN in .env}"
      PDF_BRIDGE_ALLOWED_HOSTS: '${PDF_BRIDGE_ALLOWED_HOSTS:-["localhost","127.0.0.1"]}'
      PDF_BRIDGE_TRUSTED_PROXY_CIDRS: '${PDF_BRIDGE_TRUSTED_PROXY_CIDRS:-[]}'
      PDF_BRIDGE_TRUSTED_IDENTITY_HEADER: "${PDF_BRIDGE_TRUSTED_IDENTITY_HEADER:-X-Forwarded-User}"
      PDF_BRIDGE_BRAND_PRIMARY_1: "${PDF_BRIDGE_BRAND_PRIMARY_1-#173f34}"
      PDF_BRIDGE_BRAND_PRIMARY_2: "${PDF_BRIDGE_BRAND_PRIMARY_2-#0f3028}"
      PDF_BRIDGE_BRAND_SECONDARY_1: "${PDF_BRIDGE_BRAND_SECONDARY_1-#d5a846}"
      PDF_BRIDGE_BRAND_SECONDARY_2: "${PDF_BRIDGE_BRAND_SECONDARY_2-#d9c78f}"
      PDF_BRIDGE_THEME_DEFAULT: "${PDF_BRIDGE_THEME_DEFAULT-system}"
      PDF_BRIDGE_COLLECTIONS: '${PDF_BRIDGE_COLLECTIONS:?set PDF_BRIDGE_COLLECTIONS in .env}'
      PDF_BRIDGE_CLAMD_HOST: clamav
      PDF_BRIDGE_CLAMD_PORT: "3310"
      PDF_BRIDGE_CLAMD_TIMEOUT: "${PDF_BRIDGE_CLAMD_TIMEOUT:-30}"
      PDF_BRIDGE_CLAMD_STREAM_MAX_BYTES: "${PDF_BRIDGE_CLAMD_STREAM_MAX_BYTES:-67108864}"
      PDF_BRIDGE_MAX_UPLOAD_BYTES: "${PDF_BRIDGE_MAX_UPLOAD_BYTES:-52428800}"
      PDF_BRIDGE_MAX_UPLOAD_FILES: "${PDF_BRIDGE_MAX_UPLOAD_FILES:-20}"
      PDF_BRIDGE_CLAIM_LEASE_MINUTES: "${PDF_BRIDGE_CLAIM_LEASE_MINUTES:-30}"
      PDF_BRIDGE_SEARCH_API_URL: "${PDF_BRIDGE_SEARCH_API_URL:-}"
      PDF_BRIDGE_SEARCH_API_TOKEN: "${PDF_BRIDGE_SEARCH_API_TOKEN:-}"
    ports:
      - "${PDF_BRIDGE_BIND_ADDRESS:-127.0.0.1}:${PDF_BRIDGE_PORT:-8000}:8000"
    volumes:
      - bridge_data:/var/lib/pdf-bridge
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3).read()
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  bridge_data:
  clamav_signatures:
