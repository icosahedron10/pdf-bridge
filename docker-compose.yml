name: pdf-bridge

services:
  clamav:
    # The Dockerfile pins the exact official patch and aligns INSTREAM with the app limit.
    build:
      context: .
      dockerfile: clamav.Dockerfile
    image: pdf-bridge-clamav:1.5.3-stream64m
    restart: unless-stopped
    volumes:
      - clamav_signatures:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping=5"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 3m
    mem_limit: 4g

  qdrant:
    image: qdrant/qdrant:v1.18.1
    restart: unless-stopped
    environment:
      # The bridge uses this administrative key to create aliases and mutate both index families.
      QDRANT__SERVICE__API_KEY: "${PDF_BRIDGE_QDRANT_API_KEY:?set PDF_BRIDGE_QDRANT_API_KEY in .env}"
      QDRANT__SERVICE__JWT_RBAC: "true"
      QDRANT__SERVICE__ENABLE_CORS: "false"
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - qdrant_private
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      clamav:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      PDF_BRIDGE_APP_ENV: "${PDF_BRIDGE_APP_ENV:-development}"
      PDF_BRIDGE_AUTH_MODE: "${PDF_BRIDGE_AUTH_MODE:-anonymous-poc}"
      PDF_BRIDGE_STORAGE_ROOT: /var/lib/pdf-bridge
      PDF_BRIDGE_SESSION_SECRET: "${PDF_BRIDGE_SESSION_SECRET:?set PDF_BRIDGE_SESSION_SECRET in .env}"
      PDF_BRIDGE_ALLOWED_HOSTS: '${PDF_BRIDGE_ALLOWED_HOSTS:-["localhost","127.0.0.1"]}'
      PDF_BRIDGE_TRUSTED_PROXY_CIDRS: '${PDF_BRIDGE_TRUSTED_PROXY_CIDRS:-[]}'
      PDF_BRIDGE_TRUSTED_IDENTITY_HEADER: "${PDF_BRIDGE_TRUSTED_IDENTITY_HEADER:-X-Forwarded-User}"
      PDF_BRIDGE_BRAND_PRIMARY_1: "${PDF_BRIDGE_BRAND_PRIMARY_1-#173f34}"
      PDF_BRIDGE_BRAND_PRIMARY_2: "${PDF_BRIDGE_BRAND_PRIMARY_2-#0f3028}"
      PDF_BRIDGE_BRAND_SECONDARY_1: "${PDF_BRIDGE_BRAND_SECONDARY_1-#d5a846}"
      PDF_BRIDGE_BRAND_SECONDARY_2: "${PDF_BRIDGE_BRAND_SECONDARY_2-#d9c78f}"
      PDF_BRIDGE_THEME_DEFAULT: "${PDF_BRIDGE_THEME_DEFAULT-system}"
      PDF_BRIDGE_COLLECTIONS: '${PDF_BRIDGE_COLLECTIONS:?set PDF_BRIDGE_COLLECTIONS in .env}'

      PDF_BRIDGE_CLAMD_HOST: clamav
      PDF_BRIDGE_CLAMD_PORT: "3310"
      PDF_BRIDGE_CLAMD_TIMEOUT: "${PDF_BRIDGE_CLAMD_TIMEOUT:-30}"
      PDF_BRIDGE_CLAMD_STREAM_MAX_BYTES: "${PDF_BRIDGE_CLAMD_STREAM_MAX_BYTES:-67108864}"
      PDF_BRIDGE_MAX_UPLOAD_BYTES: "${PDF_BRIDGE_MAX_UPLOAD_BYTES:-52428800}"
      PDF_BRIDGE_MAX_UPLOAD_FILES: "${PDF_BRIDGE_MAX_UPLOAD_FILES:-20}"
      PDF_BRIDGE_UPLOAD_CHUNK_BYTES: "${PDF_BRIDGE_UPLOAD_CHUNK_BYTES:-1048576}"

      PDF_BRIDGE_WORKER_ENABLED: "${PDF_BRIDGE_WORKER_ENABLED:-true}"
      PDF_BRIDGE_WORKER_POLL_SECONDS: "${PDF_BRIDGE_WORKER_POLL_SECONDS:-1}"
      PDF_BRIDGE_WORKER_LEASE_SECONDS: "${PDF_BRIDGE_WORKER_LEASE_SECONDS:-300}"
      PDF_BRIDGE_WORKER_HEARTBEAT_SECONDS: "${PDF_BRIDGE_WORKER_HEARTBEAT_SECONDS:-30}"
      PDF_BRIDGE_PARSE_WALL_CLOCK_SECONDS: "${PDF_BRIDGE_PARSE_WALL_CLOCK_SECONDS:-120}"
      PDF_BRIDGE_PARSE_CPU_SECONDS: "${PDF_BRIDGE_PARSE_CPU_SECONDS:-90}"
      PDF_BRIDGE_PARSE_MEMORY_BYTES: "${PDF_BRIDGE_PARSE_MEMORY_BYTES:-1073741824}"
      PDF_BRIDGE_ANALYSIS_MAX_PAGES: "${PDF_BRIDGE_ANALYSIS_MAX_PAGES:-2000}"
      PDF_BRIDGE_ANALYSIS_MAX_CHARACTERS: "${PDF_BRIDGE_ANALYSIS_MAX_CHARACTERS:-5000000}"
      PDF_BRIDGE_ANALYSIS_MAX_CHUNKS: "${PDF_BRIDGE_ANALYSIS_MAX_CHUNKS:-10000}"

      PDF_BRIDGE_EMBEDDING_API_URL: "${PDF_BRIDGE_EMBEDDING_API_URL:?set PDF_BRIDGE_EMBEDDING_API_URL in .env}"
      PDF_BRIDGE_EMBEDDING_API_TOKEN: "${PDF_BRIDGE_EMBEDDING_API_TOKEN:?set PDF_BRIDGE_EMBEDDING_API_TOKEN in .env}"
      PDF_BRIDGE_EMBEDDING_MODEL_ID: "${PDF_BRIDGE_EMBEDDING_MODEL_ID:?set PDF_BRIDGE_EMBEDDING_MODEL_ID in .env}"
      PDF_BRIDGE_EMBEDDING_DIMENSION: "${PDF_BRIDGE_EMBEDDING_DIMENSION:?set PDF_BRIDGE_EMBEDDING_DIMENSION in .env}"
      PDF_BRIDGE_EMBEDDING_TIMEOUT: "${PDF_BRIDGE_EMBEDDING_TIMEOUT:-30}"
      PDF_BRIDGE_LLM_API_URL: "${PDF_BRIDGE_LLM_API_URL:?set PDF_BRIDGE_LLM_API_URL in .env}"
      PDF_BRIDGE_LLM_API_TOKEN: "${PDF_BRIDGE_LLM_API_TOKEN:?set PDF_BRIDGE_LLM_API_TOKEN in .env}"
      PDF_BRIDGE_LLM_CLASSIFIER_MODEL: "${PDF_BRIDGE_LLM_CLASSIFIER_MODEL:?set PDF_BRIDGE_LLM_CLASSIFIER_MODEL in .env}"
      PDF_BRIDGE_LLM_VERIFIER_MODEL: "${PDF_BRIDGE_LLM_VERIFIER_MODEL:?set PDF_BRIDGE_LLM_VERIFIER_MODEL in .env}"
      PDF_BRIDGE_LLM_TIMEOUT: "${PDF_BRIDGE_LLM_TIMEOUT:-60}"
      PDF_BRIDGE_QDRANT_URL: http://qdrant:6333
      PDF_BRIDGE_QDRANT_API_KEY: "${PDF_BRIDGE_QDRANT_API_KEY:?set PDF_BRIDGE_QDRANT_API_KEY in .env}"
      PDF_BRIDGE_QDRANT_TIMEOUT: "${PDF_BRIDGE_QDRANT_TIMEOUT:-30}"

      PDF_BRIDGE_SEARCH_API_URL: "${PDF_BRIDGE_SEARCH_API_URL:-}"
      PDF_BRIDGE_SEARCH_API_TOKEN: "${PDF_BRIDGE_SEARCH_API_TOKEN:-}"
      PDF_BRIDGE_SEARCH_API_TIMEOUT: "${PDF_BRIDGE_SEARCH_API_TIMEOUT:-10}"
    ports:
      - "${PDF_BRIDGE_BIND_ADDRESS:-127.0.0.1}:${PDF_BRIDGE_PORT:-8000}:8000"
    volumes:
      - bridge_data:/var/lib/pdf-bridge
    networks:
      - default
      - qdrant_private
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3).read()
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  qdrant_private:
    internal: true

volumes:
  bridge_data:
  clamav_signatures:
  qdrant_data:
